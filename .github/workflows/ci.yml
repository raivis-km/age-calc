name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ./src/Calculator.Api/Calculator.Api.csproj

      - name: Build
        run: dotnet build ./src/Calculator.Api/Calculator.Api.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test ./tests/Calculator.Tests/Calculator.Tests.csproj --no-build --configuration Release

  docker-build:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build -t calculator-api:${{ github.sha }} .
